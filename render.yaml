services:
  # FastAPI Backend
  - type: web
    name: tiktok-automation-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GEELARK_AUTH_METHOD
        value: TOKEN
      - key: GEELARK_APP_TOKEN
        sync: false
      - key: GEELARK_API_BASE_URL
        value: https://openapi.geelark.com/open/v1
      # Kie.ai for JesusAI video generation (Nano Banana Pro + Kling 2.6)
      - key: KIE_API_KEY
        sync: false
      # Optional: Anthropic for dynamic prompt variation (falls back to JSON templates)
      - key: ANTHROPIC_API_KEY
        sync: false
      # "hailuo" (default, ~$0.15 video, proven) or "kling" (~$0.10 video,
      # cheaper but kie.ai model slug needs verification — see video_generator.py)
      - key: JESUSAI_VIDEO_MODEL
        value: hailuo
      # Max parallel video generation workers (Standard 2GB plan can handle 8+)
      - key: JESUSAI_MAX_PARALLEL_VIDEOS
        value: "8"
      # APScheduler internal thread pool (bumped from default 10)
      - key: APSCHEDULER_THREAD_POOL
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: tiktok-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: WARMUP_DAYS
        value: "7"
      - key: VIDEO_STORAGE_PATH
        value: ./data/videos

  # Streamlit Dashboard
  - type: web
    name: tiktok-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt streamlit pandas
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # NOTE: Override this in the Render dashboard UI to match your actual
      # API service URL (Render may append a suffix like "-4o6b" to the
      # hostname if the bare name was taken). The value below is just the
      # default and will be wrong if your API service has a suffix.
      - key: API_BASE_URL
        value: https://tiktok-automation-api-4o6b.onrender.com/api

databases:
  - name: tiktok-db
    plan: basic-256mb
    databaseName: tiktok_automation
